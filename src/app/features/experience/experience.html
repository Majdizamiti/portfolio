<section id="experience" class="experience-section">
    <div class="experience-container">

        <h2 class="section-title">Experience</h2>
        <p class="section-subtitle">My professional journey in DevOps and system administration</p>

        <div class="timeline">
            <div class="timeline-line"></div>

            <div class="timeline-item" *ngFor="let exp of experiences; let i = index" [class.right]="i % 2 !== 0">

                <div class="timeline-dot">
                    <div class="dot-inner"></div>
                </div>

                <div class="timeline-card">
                    <span class="period">{{ exp.period }}</span>
                    <h3 class="role">{{ exp.role }}</h3>
                    <span class="company">{{ exp.company }}</span>
                    <p class="description">{{ exp.description }}</p>
                    <div class="tech-tags">
                        <span class="tag" *ngFor="let tech of exp.technologies">{{ tech }}</span>
                    </div>
                </div>

            </div>
        </div>

    </div>
</section>
